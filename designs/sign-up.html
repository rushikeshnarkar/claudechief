<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Claude Chief</title>
  <meta name="description" content="Create your Claude Chief account to save and download premium AI resources.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: { base: '#0D0B0F', surface: '#1A1720', elevated: '#131118' },
            border: { DEFAULT: 'rgba(54, 46, 40, 0.5)' },
            terra: { DEFAULT: '#D97757', hover: '#E5886A' },
            text: { primary: '#F5F0EB', secondary: '#A99E92', muted: '#6B6158' }
          },
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['DM Sans', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    body { background-color: #0D0B0F; }

    .glass-card {
      background: linear-gradient(135deg, rgba(19,17,24,0.88) 0%, rgba(26,23,32,0.6) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(54, 46, 40, 0.5);
      border-radius: 22px;
    }

    .animate-fadeUp {
      animation: fadeUp 0.5s ease-out forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-primary {
      background: linear-gradient(135deg, #D97757 0%, #C15F3C 100%);
      color: #F5F0EB;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #E5886A 0%, #D97757 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(217, 119, 87, 0.35);
    }

    .btn-outline {
      background: transparent;
      color: #F5F0EB;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      border: 1px solid rgba(54, 46, 40, 0.5);
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-outline:hover {
      border-color: #D97757;
      background: rgba(217, 119, 87, 0.08);
    }

    .grain::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .input-field {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: #131118;
      border: 1px solid rgba(54, 46, 40, 0.5);
      border-radius: 12px;
      color: #F5F0EB;
      font-size: 15px;
      transition: all 0.25s ease;
    }
    .input-field::placeholder {
      color: #6B6158;
    }
    .input-field:focus {
      outline: none;
      border-color: #D97757;
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.1);
    }

    .success-card {
      background: linear-gradient(135deg, rgba(19,17,24,0.88) 0%, rgba(26,23,32,0.6) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(54, 46, 40, 0.5);
      border-radius: 22px;
    }
  </style>
</head>
<body class="grain text-text-primary font-sans">
  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 h-[72px] flex items-center px-6 lg:px-8 bg-[#0D0B0F]/[0.85] backdrop-blur-xl border-b border-[rgba(54,46,40,0.3)]">
    <div class="container max-w-7xl mx-auto flex items-center justify-between w-full">
      <a href="index.html" class="flex items-center gap-3">
        <div class="relative w-10 h-10">
          <div class="absolute inset-0 bg-[#D97757] rounded-[10px] overflow-hidden">
            <div class="absolute top-[5px] right-[5px] w-3.5 h-3.5 bg-[#F5F0EB] rounded-full"></div>
            <div class="absolute bottom-[5px] left-[6px] w-2.5 h-2.5 bg-[#F5F0EB] rounded-[3px] rotate-12"></div>
          </div>
        </div>
        <span class="font-display text-xl font-bold text-[#F5F0EB] tracking-tight">Claude Chief</span>
      </a>

      <div class="flex items-center gap-3">
        <a href="sign-in.html" class="text-sm text-[#A99E92] hover:text-[#F5F0EB] transition-colors">Sign in</a>
      </div>
    </div>
  </nav>

  <!-- SIGN UP FORM -->
  <div class="min-h-screen flex items-center justify-center px-4 py-20 bg-[#0D0B0F]">
    <div class="w-full max-w-md animate-fadeUp">
      <!-- Header -->
      <div class="text-center mb-10">
        <h1 class="font-display text-3xl sm:text-4xl font-bold text-[#F5F0EB] tracking-tight mb-3">Create your account</h1>
        <p class="text-[#A99E92] text-base">Join Claude Chief to save and download resources</p>
      </div>

      <!-- Form Card -->
      <div class="relative p-8 glass-card">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[radial-gradient(circle_at_top_right,rgba(217,119,87,0.08),transparent_70%)]"></div>

        <form class="space-y-6 relative">
          <!-- Error Message (hidden by default) -->
          <div class="hidden p-4 bg-[rgba(239,68,68,0.1)] border border-[rgba(239,68,68,0.2)] rounded-xl text-sm text-[#EF4444]">
            Password must be at least 8 characters
          </div>

          <!-- Name -->
          <div>
            <label for="name" class="block text-sm font-medium text-[#A99E92] mb-2">Full Name</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B6158] pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <input
                id="name"
                type="text"
                placeholder="John Doe"
                class="input-field"
                required
                autocomplete="name"
              />
            </div>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-[#A99E92] mb-2">Email</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B6158] pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              <input
                id="email"
                type="email"
                placeholder="you@example.com"
                class="input-field"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-medium text-[#A99E92] mb-2">Password</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B6158] pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              <input
                id="password"
                type="password"
                placeholder="Min 8 characters"
                class="input-field pr-12"
                required
                minlength="8"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B6158] hover:text-[#A99E92] transition-colors"
                aria-label="Show password"
              >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary w-full justify-center h-12 text-base">
            Create Account
          </button>

          <!-- Divider -->
          <div class="relative py-2">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-[rgba(54,46,40,0.5)]"></div>
            </div>
            <div class="relative flex justify-center">
              <span class="px-4 bg-[rgba(19,17,24,0.88)] text-xs text-[#6B6158]">or</span>
            </div>
          </div>

          <!-- Google Sign Up -->
          <button type="button" class="btn-outline w-full justify-center h-12">
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>
        </form>

        <!-- Terms -->
        <p class="mt-6 text-xs text-center text-[#6B6158]">
          By signing up, you agree to our <a href="#" class="text-[#6A9BCC] hover:underline">Terms of Service</a> and <a href="#" class="text-[#6A9BCC] hover:underline">Privacy Policy</a>
        </p>
      </div>

      <!-- Footer -->
      <p class="text-center mt-8 text-sm text-[#6B6158]">
        Already have an account? <a href="sign-in.html" class="text-[#D97757] hover:text-[#E5886A] font-medium transition-colors">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
